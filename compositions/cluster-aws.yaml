# Cluster -> one provider-opentofu Workspace that runs the landing-zone
# fleet/aws/cluster-stack entrypoint (network + cluster wired tofu-natively), then
# maps the entrypoint's outputs back to the Cluster's status.
#
# provider-opentofu runs `tofu` against the plain-tofu entrypoint (not a component
# directory). The entrypoint owns the AWS provider (region + default_tags + an
# optional cross-account assume_role) and the S3 backend block, so a single
# ClusterProviderConfig (source None = the hub's IRSA) serves every account; the
# per-cluster account targeting rides on the assume_role_arn var, and the per-cluster
# state key rides on initArgs, below.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: cluster-aws
  labels:
    provider: aws
    substrate: tofu
spec:
  compositeTypeRef:
    apiVersion: fleet.nanohype.dev/v1alpha1
    kind: Cluster
  mode: Pipeline
  pipeline:
    - step: render-workspace
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: cluster-stack
            base:
              apiVersion: opentofu.m.upbound.io/v1beta1
              kind: Workspace
              spec:
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
                writeConnectionSecretToRef:
                  name: ""  # patched: <name>-kubeconfig (lands in the Cluster's namespace)
                forProvider:
                  source: Remote
                  # base default = the XRD's moduleSource default; the patch below
                  # overrides it when a Cluster sets spec.moduleSource.
                  module: "git::https://github.com/nanohype/landing-zone.git//fleet/aws/cluster-stack?ref=main"
                  enableTofuCLILogging: true
                  remotePullPolicy: IfNotPresent
                  # Index-ordered vars matching fleet/aws/cluster-stack/variables.tf.
                  # tofu binds by key, not position — the indices only couple the
                  # patches below to these entries. A later move to function-go-templating
                  # drops the coupling.
                  # value: "" base defaults keep the required vars[].value present at
                  # render (crossplane render doesn't apply XRD defaults); the patches
                  # below override them, and at apply the XRD defaults populate the rest.
                  vars:
                    - key: region           # 0
                      value: ""
                    - key: environment      # 1
                      value: ""
                    - key: team             # 2
                      value: ""
                    - key: cluster_name     # 3
                      value: ""
                    - key: cluster_version  # 4
                      value: ""
                    - key: vpc_cidr         # 5
                      value: ""
                    - key: assume_role_arn  # 6
                      value: ""
                  # `tofu init` args complete the entrypoint's partial S3 backend
                  # block. bucket + encrypt are static; key + region are patched per
                  # cluster, so every Cluster gets an isolated state object.
                  initArgs:
                    - "-backend-config=bucket=nanohype-eks-fleet-tfstate"
                    - ""  # patched [1]: -backend-config=key=fleet/<name>/terraform.tfstate
                    - ""  # patched [2]: -backend-config=region=<region>
                    - "-backend-config=encrypt=true"
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.moduleSource
                toFieldPath: spec.forProvider.module
              # spec -> tofu vars (fleet/aws/cluster-stack/variables.tf)
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.vars[0].value
              - type: FromCompositeFieldPath
                fromFieldPath: spec.environment
                toFieldPath: spec.forProvider.vars[1].value
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.vars[2].value
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.vars[3].value
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterVersion
                toFieldPath: spec.forProvider.vars[4].value
              - type: FromCompositeFieldPath
                fromFieldPath: spec.network.vpcCidr
                toFieldPath: spec.forProvider.vars[5].value
              # spec.vendRoleArn -> the entrypoint's provider assume_role (cross-
              # account). Empty (default) = no assume_role; the entrypoint uses the
              # hub's own credentials, which is the same-account / kind-hub path.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.vendRoleArn
                toFieldPath: spec.forProvider.vars[6].value
              # per-cluster S3 state key + region (tofu init -backend-config args)
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.forProvider.initArgs[1]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "-backend-config=key=fleet/%s/terraform.tfstate"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.initArgs[2]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "-backend-config=region=%s"
              # kubeconfig secret name, per cluster
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-kubeconfig"
              # entrypoint outputs -> Cluster status
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.cluster_name
                toFieldPath: status.clusterName
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.cluster_endpoint
                toFieldPath: status.clusterEndpoint
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.cluster_certificate_authority_data
                toFieldPath: status.certificateAuthorityData
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.cluster_security_group_id
                toFieldPath: status.clusterSecurityGroupId
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.oidc_provider_arn
                toFieldPath: status.oidcProviderArn
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.oidc_issuer
                toFieldPath: status.oidcIssuer
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.karpenter_iam_role_arn
                toFieldPath: status.karpenterIamRoleArn
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.outputs.vpc_id
                toFieldPath: status.vpcId
