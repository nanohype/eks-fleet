# Cluster -> two provider-opentofu Workspaces, rendered with function-go-templating:
#   cluster-stack     (always) runs landing-zone fleet/aws/cluster-stack (network + cluster)
#   cluster-bootstrap (gated)   runs fleet/aws/cluster-bootstrap (agent-iam + Cilium/ArgoCD),
#                               rendered once the cluster publishes its endpoint to
#                               Cluster.status, so it never plans against an empty endpoint.
#
# Go-templating renders the Workspace vars directly: scalars as quoted strings (tofu coerces
# bool/number from the string), and list-typed vars (endpointPublicAccessCidrs — the public-API
# allowlist — and systemNodes.instanceTypes) JSON-encoded via toJson so they reach tofu as real
# lists. Spec lookups use `dig` (default only a genuinely-missing key), so an explicit false / 0 /
# empty list is honored rather than collapsed to the default. function-auto-ready (the second
# pipeline step) marks the XR ready once both Workspaces converge.
#
# A single ClusterProviderConfig (source None = the hub's IRSA) serves every account; per-cluster
# account targeting rides on assume_role_arn (spec.vendRoleArn), per-cluster state on initArgs,
# and the fleet IAM gate's boundary on cluster_/operator_permissions_boundary_arn (the
# SSM-published fleet boundary, wired via spec.{cluster,operator}PermissionsBoundaryArn).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: cluster-aws
  labels:
    provider: aws
    substrate: tofu
spec:
  compositeTypeRef:
    apiVersion: fleet.nanohype.dev/v1alpha1
    kind: Cluster
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $spec := $xr.spec }}
            {{- $name := $xr.metadata.name }}
            {{- $ns := $xr.metadata.namespace }}
            {{- $net := $spec.network | default dict }}
            {{- /* network is discriminated on mode: create reads $create, adopt reads */}}
            {{- /* $adopt. Both sub-objects default to empty here, so a spec that fills */}}
            {{- /* only its mode's side leaves the other's vars at their tofu defaults. */}}
            {{- $mode := dig "mode" "create" $net }}
            {{- $create := dig "create" dict $net }}
            {{- $adopt := dig "adopt" dict $net }}
            {{- $adoptSubnets := dig "subnetIds" dict $adopt }}
            {{- $sys := $spec.systemNodes | default dict }}
            {{- /* Pinned landing-zone SHA (not ?ref=main): provider-opentofu caches by ref */}}
            {{- /* + never re-pulls, so a moving ref is non-reproducible. Lockstep with the */}}
            {{- /* XRD moduleSource default in apis/cluster/definition.yaml. */}}
            {{- $module := dig "moduleSource" "git::https://github.com/nanohype/landing-zone.git?ref=9243a18005f92fb932a766537bb88c5becfeb759" $spec }}
            {{- /* cluster-stack's fresh tofu outputs (empty until it has applied) */}}
            {{- $cs := index (.observed.resources | default dict) "cluster-stack" }}
            {{- $csOut := dict }}
            {{- if $cs }}{{ $csOut = dig "atProvider" "outputs" dict ($cs.resource.status | default dict) }}{{ end }}
            {{- $csEndpoint := dig "cluster_endpoint" "" $csOut }}
            {{- /* the cluster's durable identity is the XR's own persisted status. The bootstrap
                   gate + its identity vars read from here, not the volatile observed output, so a
                   transient cluster-stack reconcile can't drop the bootstrap Workspace (and GC its
                   Cilium/ArgoCD state) or blank its vars. The write-back below keeps it fresh. */}}
            {{- $st := $xr.status | default dict }}
            {{- $endpoint := dig "clusterEndpoint" "" $st }}
            ---
            # cluster-stack: the network + EKS cluster (AWS only). Always rendered.
            apiVersion: opentofu.m.upbound.io/v1beta1
            kind: Workspace
            metadata:
              # explicit name (not generateName) so the teardown-ordering Usage below can
              # reference it; the external-name annotation still carries the tofu identity.
              name: {{ $name }}-stack
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cluster-stack
                crossplane.io/external-name: {{ $name }}
            spec:
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              writeConnectionSecretToRef:
                name: {{ $name }}-kubeconfig
              forProvider:
                source: Remote
                module: {{ $module | quote }}
                entrypoint: fleet/aws/cluster-stack
                enableTofuCLILogging: true
                remotePullPolicy: IfNotPresent
                vars:
                  - {key: region, value: {{ $spec.region | quote }}}
                  - {key: environment, value: {{ dig "environment" "development" $spec | quote }}}
                  - {key: team, value: {{ $spec.team | quote }}}
                  - {key: cluster_name, value: {{ $spec.clusterName | quote }}}
                  - {key: cluster_version, value: {{ dig "clusterVersion" "1.36" $spec | quote }}}
                  # network: mode selects which side is live. create levers (vpc_cidr, IPAM,
                  # TGW, centralized egress, AZ/NAT counts) read from $create; adopt IDs from
                  # $adopt. The network component's cross-mode preconditions reject a value
                  # from the wrong side, so the inactive side must stay at its tofu default —
                  # which it does, because the XRD defaults the unused sub-object empty and a
                  # spec never populates the other mode's fields.
                  - {key: network_mode, value: {{ $mode | quote }}}
                  - {key: vpc_cidr, value: {{ dig "vpcCidr" "10.0.0.0/16" $create | quote }}}
                  - {key: ipam_pool_id, value: {{ dig "ipamPoolId" "" $create | quote }}}
                  - {key: ipam_netmask_length, value: {{ dig "ipamNetmaskLength" 0 $create | quote }}}
                  - {key: transit_gateway_id, value: {{ dig "transitGatewayId" "" $create | quote }}}
                  - {key: centralized_egress, value: {{ dig "centralizedEgress" false $create | quote }}}
                  # adopt-mode subnet references — JSON-encoded lists (tofu parses ["a","b"]
                  # as a real list(string)). Empty in create mode; the adopt_* vars default [].
                  - {key: adopt_vpc_id, value: {{ dig "vpcId" "" $adopt | quote }}}
                  - {key: adopt_private_subnet_ids, value: {{ dig "private" (list) $adoptSubnets | toJson | quote }}}
                  - {key: adopt_public_subnet_ids, value: {{ dig "public" (list) $adoptSubnets | toJson | quote }}}
                  - {key: assume_role_arn, value: {{ dig "vendRoleArn" "" $spec | quote }}}
                  # path-gated under /eks-fleet/ for every hub vend (hub role same-account, fleet-vend cross-account)
                  - {key: cluster_iam_role_path, value: "/eks-fleet/"}
                  # the path's other half: the fleet role's IAM gate only allows role writes
                  # under /eks-fleet/ that carry its exact permissions boundary, so cluster
                  # roles mint with the SSM-published boundary ARN (fleet-vend's
                  # vend_permissions_boundary_arn cross-account, fleet-hub's
                  # hub_permissions_boundary_arn same-account) — wired via the spec like
                  # vendRoleArn. Empty = ungated (the local kind hub on user creds).
                  - {key: cluster_permissions_boundary_arn, value: {{ dig "clusterPermissionsBoundaryArn" "" $spec | quote }}}
                  - {key: cluster_endpoint_public_access, value: {{ dig "endpointPublicAccess" false $spec | quote }}}
                  - {key: max_azs, value: {{ dig "maxAzs" 3 $create | quote }}}
                  - {key: nat_gateways, value: {{ dig "natGateways" 1 $create | quote }}}
                  - {key: system_node_min_size, value: {{ dig "minSize" 2 $sys | quote }}}
                  - {key: system_node_max_size, value: {{ dig "maxSize" 6 $sys | quote }}}
                  - {key: system_node_desired_size, value: {{ dig "desiredSize" 2 $sys | quote }}}
                  - {key: system_node_disk_size, value: {{ dig "diskSize" 100 $sys | quote }}}
                  # list-typed -> JSON string (tofu parses it as list(string)). The XRD's CEL
                  # rule guarantees a public endpoint always carries a non-empty allowlist, so
                  # the cluster module's empty-list -> ["0.0.0.0/0"] fallback never fires on a
                  # vended cluster; an empty list only rides along while the endpoint is private.
                  - {key: cluster_endpoint_public_access_cidrs, value: {{ dig "endpointPublicAccessCidrs" (list) $spec | toJson | quote }}}
                  - {key: system_node_instance_types, value: {{ dig "instanceTypes" (list "m7g.xlarge" "m6g.xlarge") $sys | toJson | quote }}}
                  - {key: bootstrap_access_role_arn, value: {{ dig "bootstrapAccessRoleArn" "" $spec | quote }}}
                  - {key: portal_access_role_arn, value: {{ dig "portalAccessRoleArn" "" $spec | quote }}}
                  - {key: ttl_days, value: {{ dig "ttlDays" 0 $spec | quote }}}
                initArgs:
                  - "-backend-config=bucket=nanohype-eks-fleet-tfstate"
                  # namespace-qualified state key: the Cluster name is unique only within
                  # its namespace (two teams may each vend a `foo`), so the namespace rides
                  # the key. Without it, two same-named Clusters in two namespaces would
                  # share one state object and clobber each other's cluster.
                  - "-backend-config=key=fleet/{{ $ns }}/{{ $name }}/terraform.tfstate"
                  # the state bucket is a single hub-account resource pinned to us-west-2 (it
                  # never moves with the workload region); the S3 backend validates the bucket
                  # against this region, so it's the bucket's region, NOT spec.region. Decoupled
                  # so a vend into any region still inits against the one real state bucket.
                  - "-backend-config=region=us-west-2"
                  # S3-native state locking (tofu >= 1.10, which provider-opentofu v1.1.4 ships):
                  # a lock file in the same bucket, no DynamoDB table.
                  - "-backend-config=use_lockfile=true"
                  - "-backend-config=encrypt=true"
            {{- if $endpoint }}
            ---
            # cluster-bootstrap: agent-iam + Cilium/ArgoCD (k8s/helm). Rendered once the cluster
            # publishes its endpoint to Cluster.status, so its cluster-identity vars (read from the
            # durable status) are always populated.
            apiVersion: opentofu.m.upbound.io/v1beta1
            kind: Workspace
            metadata:
              name: {{ $name }}-bootstrap
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cluster-bootstrap
                crossplane.io/external-name: {{ $name }}-bootstrap
            spec:
              providerConfigRef:
                kind: ClusterProviderConfig
                name: default
              forProvider:
                source: Remote
                module: {{ $module | quote }}
                entrypoint: fleet/aws/cluster-bootstrap
                enableTofuCLILogging: true
                remotePullPolicy: IfNotPresent
                vars:
                  - {key: region, value: {{ $spec.region | quote }}}
                  - {key: environment, value: {{ dig "environment" "development" $spec | quote }}}
                  - {key: team, value: {{ $spec.team | quote }}}
                  - {key: assume_role_arn, value: {{ dig "vendRoleArn" "" $spec | quote }}}
                  - {key: cluster_name, value: {{ dig "clusterName" "" $st | quote }}}
                  - {key: cluster_endpoint, value: {{ $endpoint | quote }}}
                  - {key: cluster_certificate_authority_data, value: {{ dig "certificateAuthorityData" "" $st | quote }}}
                  - {key: oidc_provider_arn, value: {{ dig "oidcProviderArn" "" $st | quote }}}
                  - {key: oidc_issuer, value: {{ dig "oidcIssuer" "" $st | quote }}}
                  # agent-iam encrypts the model-artifacts + eval-reports buckets with the
                  # spoke's secrets-component data CMK. A spoke prerequisite referenced by
                  # ARN (like vendRoleArn / the boundaries), not something the vend creates:
                  # cluster-stack has no secrets module, so the order desk supplies the ARN
                  # (SSM /platform/<env>/secrets/kms-key-arn in the spoke) via spec.dataKmsKeyArn.
                  # Empty = ungated local/hub validation (no real artifacts bucket).
                  - {key: data_kms_key_arn, value: {{ dig "dataKmsKeyArn" "" $spec | quote }}}
                  - {key: vpc_id, value: {{ dig "vpcId" "" $st | quote }}}
                  # network topology for the in-cluster ArgoCD Secret + kube-system/network-config
                  # ConfigMap: network_mode is the spec's mode (a deterministic input); the subnet
                  # lists ride the durable status (cluster-stack outputs, written back below), so
                  # they're always populated by the time this Workspace renders. cluster-bootstrap
                  # publishes them only in adopt mode (a create-mode cluster discovers subnets by
                  # the ELB role tags it stamps), so create-mode subnets are passed through and
                  # correctly dropped there.
                  - {key: network_mode, value: {{ $mode | quote }}}
                  - {key: private_subnet_ids, value: {{ dig "privateSubnetIds" (list) $st | toJson | quote }}}
                  - {key: public_subnet_ids, value: {{ dig "publicSubnetIds" (list) $st | toJson | quote }}}
                  # same fleet-role boundary as cluster-stack's cluster_permissions_boundary_arn:
                  # the agent-platform operator role must carry the ceiling of the fleet role
                  # minting it, or the IAM gate rejects the CreateRole.
                  - {key: operator_permissions_boundary_arn, value: {{ dig "operatorPermissionsBoundaryArn" "" $spec | quote }}}
                  - {key: enable_agent_platform, value: {{ dig "enableAgentPlatform" true $spec | quote }}}
                  - {key: tenants_repo_url, value: {{ dig "tenantsRepoUrl" "" $spec | quote }}}
                  # addon-catalog GitOps repo the spoke's app-of-apps tracks. Required +
                  # git-URL-validated by the substrate (no default there), so always sent;
                  # defaults to the org's eks-gitops catalog via the XRD.
                  - {key: gitops_repo_url, value: {{ dig "gitopsRepoUrl" "https://github.com/nanohype/eks-gitops.git" $spec | quote }}}
                  - {key: gitops_repo_branch, value: {{ dig "gitopsRepoBranch" "main" $spec | quote }}}
                initArgs:
                  - "-backend-config=bucket=nanohype-eks-fleet-tfstate"
                  # namespace-qualified, same as cluster-stack (see the note there); the
                  # -bootstrap suffix keeps the two Workspaces' state objects distinct.
                  - "-backend-config=key=fleet/{{ $ns }}/{{ $name }}-bootstrap/terraform.tfstate"
                  # the state bucket's own region (us-west-2), decoupled from spec.region.
                  - "-backend-config=region=us-west-2"
                  - "-backend-config=use_lockfile=true"
                  - "-backend-config=encrypt=true"
            ---
            # teardown ordering: cluster-bootstrap's `tofu destroy` needs the spoke API that
            # cluster-stack provides, so block cluster-stack's deletion until the bootstrap
            # Workspace is gone. replayDeletion re-issues the blocked cluster-stack delete the
            # moment the bootstrap clears, so the cascade doesn't wait on the GC backoff.
            apiVersion: protection.crossplane.io/v1beta1
            kind: Usage
            metadata:
              name: {{ $name }}-bootstrap-uses-stack
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cluster-bootstrap-usage
                # an ordering construct, not a workload — its existence is its readiness, so
                # mark it ready in-template rather than let auto-ready wait on a Ready condition
                # the Usage never reports (which would wedge the XR's own readiness).
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              replayDeletion: true
              reason: cluster-bootstrap tofu destroy needs the cluster-stack API endpoint
              of:
                apiVersion: opentofu.m.upbound.io/v1beta1
                kind: Workspace
                resourceRef:
                  name: {{ $name }}-stack
              by:
                apiVersion: opentofu.m.upbound.io/v1beta1
                kind: Workspace
                resourceRef:
                  name: {{ $name }}-bootstrap
            {{- end }}
            {{- if $csEndpoint }}
            ---
            # status write-back: cluster-stack's fresh tofu outputs -> Cluster.status (the XR sans
            # the composition-resource-name annotation updates status only). Gated on the fresh
            # output being present, so a transient blank reconcile never clobbers a good status.
            apiVersion: fleet.nanohype.dev/v1alpha1
            kind: Cluster
            status:
              clusterName: {{ dig "cluster_name" "" $csOut | quote }}
              clusterEndpoint: {{ $csEndpoint | quote }}
              certificateAuthorityData: {{ dig "cluster_certificate_authority_data" "" $csOut | quote }}
              clusterSecurityGroupId: {{ dig "cluster_security_group_id" "" $csOut | quote }}
              oidcProviderArn: {{ dig "oidc_provider_arn" "" $csOut | quote }}
              oidcIssuer: {{ dig "oidc_issuer" "" $csOut | quote }}
              karpenterIamRoleArn: {{ dig "karpenter_iam_role_arn" "" $csOut | quote }}
              vpcId: {{ dig "vpc_id" "" $csOut | quote }}
              # list-typed outputs: provider-opentofu stores each output as raw JSON, which
              # function-go-templating decodes to a native slice — so these render through
              # toJson (a real YAML array), not quote. subnetAzIds carries the private
              # subnets' AZ *IDs* (cross-account-stable), never the account-local AZ names.
              privateSubnetIds: {{ dig "private_subnet_ids" (list) $csOut | toJson }}
              publicSubnetIds: {{ dig "public_subnet_ids" (list) $csOut | toJson }}
              subnetAzIds: {{ dig "private_subnet_az_ids" (list) $csOut | toJson }}
            {{- end }}
    - step: ready
      functionRef:
        name: function-auto-ready
