version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  lint:
    desc: yamllint all manifests
    cmds:
      - yamllint -c .yamllint.yaml .

  render:
    desc: Render a namespaced Cluster to the managed resources it produces
    vars:
      EXAMPLE: '{{.EXAMPLE | default "examples/cluster-development.yaml"}}'
    cmds:
      - crossplane render {{.EXAMPLE}} compositions/cluster-aws.yaml config/functions.yaml

  validate:
    desc: Lint + render the Cluster examples against the composition (no cluster needed)
    deps: [lint]
    cmds:
      - |
        for ex in examples/*.yaml; do
          echo "render $ex"
          crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml >/dev/null
        done
      - echo "All validations passed."

  reap-orphans:
    desc: "Sweep cluster resources tofu can't reach (orphan log groups + Karpenter infra). DRY-RUN unless APPLY=1. PROFILE required."
    vars:
      REGION: '{{.REGION | default "us-west-2"}}'
    cmds:
      - scripts/reap-orphans.sh --profile {{.PROFILE}} --region {{.REGION}} {{if eq .APPLY "1"}}--apply{{end}}
