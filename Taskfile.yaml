version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  lint:
    desc: yamllint all manifests
    cmds:
      - yamllint -c .yamllint.yaml .

  render:
    desc: Render an XCluster XR fixture to the managed resources it produces
    vars:
      EXAMPLE: '{{.EXAMPLE | default "examples/xr/xcluster-dev.yaml"}}'
    cmds:
      - crossplane render {{.EXAMPLE}} compositions/cluster-aws.yaml config/functions.yaml

  validate:
    desc: Lint + render the XR fixtures against the compositions (no cluster needed)
    deps: [lint]
    cmds:
      - |
        for ex in examples/xr/*.yaml; do
          echo "render $ex"
          crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml >/dev/null
        done
      - echo "All validations passed."
