# One ProviderConfig for the hub. credentials = InjectedIdentity: the management
# cluster's Crossplane ServiceAccount (IRSA, management account). It deliberately
# declares NO provider/assume_role/backend block — the fleet/aws/cluster-stack
# entrypoint owns the AWS provider (region + default_tags + optional assume_role),
# and the Workspace supplies the S3 backendConfig.
#
# Cross-account targeting rides on the entrypoint's assume_role_arn var (the
# composition sets it to the workload account's terraform-vend role); the hub's
# IRSA role is allowed to sts:AssumeRole that role. So one ProviderConfig serves
# every account — no per-account duplication.
apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    - filename: aws-creds.ini
      source: InjectedIdentity
