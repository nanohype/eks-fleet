# The hub ProviderConfig (single, cluster-scoped). provider-opentofu's namespaced
# Workspaces reference this ClusterProviderConfig by name. credentials source None =
# write no creds file; the runner pod's ambient IRSA (the provider ServiceAccount's
# eks.amazonaws.com/role-arn) supplies the AWS SDK credential chain. The cluster-stack
# entrypoint owns the AWS provider (region + default_tags + optional cross-account
# assume_role) and the S3 backend block; per-cluster backend keys ride on the Workspace
# initArgs. So one ClusterProviderConfig serves every account — cross-account targeting
# rides on the claim's vendRoleArn -> the entrypoint's assume_role, not a per-account config.
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  credentials:
    - filename: aws-creds.ini
      source: None
