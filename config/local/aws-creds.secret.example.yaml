# Template for the local kind hub's AWS credentials. provider-opentofu reads
# these to run tofu against AWS. Generate a real (uncommitted) copy from your SSO
# session — the creds are short-lived, so run the validation within the session:
#
#   aws configure export-credentials --profile fleet-admin --format env
#   # then put the values below and apply (DO NOT commit the filled copy):
#   kubectl create secret generic aws-creds -n crossplane-system \
#     --from-literal=credentials="$(printf '[default]\naws_access_key_id=%s\naws_secret_access_key=%s\naws_session_token=%s\n' \
#       "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$AWS_SESSION_TOKEN")"
#
# This .example is the shape only — the placeholders are not real keys.
apiVersion: v1
kind: Secret
metadata:
  name: aws-creds
  namespace: crossplane-system
type: Opaque
stringData:
  credentials: |
    [default]
    aws_access_key_id = REPLACE_WITH_TEMP_KEY_ID
    aws_secret_access_key = REPLACE_WITH_TEMP_SECRET
    aws_session_token = REPLACE_WITH_TEMP_SESSION_TOKEN
