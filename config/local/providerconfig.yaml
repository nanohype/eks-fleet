# Secret-cred ClusterProviderConfig for the local kind hub (kx). Replaces the
# production source: None (kind has no IRSA) — provider-opentofu reads AWS creds from
# the `aws-creds` Secret instead. Named `default` so the composition's Workspace
# (providerConfigRef kind ClusterProviderConfig, name default) uses it as-is.
#
# The creds are a short-lived SSO session (see aws-creds.secret.example.yaml), so the
# whole validation must finish within the session's lifetime. VERIFY on first run that
# provider-opentofu exposes the creds file to the tofu run (writes `filename` + points
# the AWS SDK at it); fallback is env-var creds via the runtime config.
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  credentials:
    - filename: aws-credentials.ini
      source: Secret
      secretRef:
        namespace: crossplane-system
        name: aws-creds
        key: credentials
