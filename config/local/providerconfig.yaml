# ClusterProviderConfig for the local kind hub (kx). Same `source: None` as
# production — but where prod's creds come from the pod's IRSA identity, here they
# come from env vars the local DeploymentRuntimeConfig (providers.yaml) injects from
# the mounted aws-creds Secret (AWS_SHARED_CREDENTIALS_FILE → the [default] INI).
# source: None writes no competing creds file, so the AWS SDK uses that ambient chain.
# Named `default` so the composition's Workspace uses it as-is.
#
# The creds are a short-lived SSO session, so the whole validation must finish within
# the session's lifetime; refresh by recreating the aws-creds Secret + rolling the pod.
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  credentials:
    - filename: aws-creds.ini
      source: None
