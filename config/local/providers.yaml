# provider-opentofu for a LOCAL kind hub (kx) — same package as the EKS bootstrap,
# but the runtime config carries NO IRSA annotation (kind has no IRSA). Credentials
# come from the Secret-cred ClusterProviderConfig (providerconfig.yaml), not the pod's
# identity. The 60m timeout + 1m poll still apply.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-opentofu
spec:
  package: xpkg.upbound.io/upbound/provider-opentofu:v1.1.3
  runtimeConfigRef:
    name: provider-opentofu-local
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-opentofu-local
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          # kind has no IRSA, so the tofu run gets AWS creds from the pod env:
          # mount the aws-creds Secret (the [default] INI under key `credentials`)
          # and point the AWS SDK at it. The ClusterProviderConfig stays source: None
          # (no competing creds file) — local mirrors the prod IRSA path, with env
          # creds standing in for the pod's IRSA identity.
          volumes:
            - name: aws-creds
              secret:
                secretName: aws-creds
          containers:
            - name: package-runtime
              args:
                - --debug
                - --timeout=60m
                - --poll=1m
                - --max-reconcile-rate=5
              env:
                - name: AWS_REGION
                  value: us-west-2
                - name: AWS_SHARED_CREDENTIALS_FILE
                  value: /aws-creds/credentials
              volumeMounts:
                - name: aws-creds
                  mountPath: /aws-creds
                  readOnly: true
