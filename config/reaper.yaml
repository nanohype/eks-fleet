# Hub-side reaper for ephemeral spokes. Deletes Cluster CRs whose ttlDays has
# elapsed since creation — Crossplane then runs the composition's ordered
# tofu destroy, so the spoke is torn down cleanly and leaves no orphans. Only
# clusters with spec.ttlDays > 0 are candidates; persistent clusters (ttlDays
# unset/0) are never touched. Apply to the hub alongside the other config/ pieces.
#
# Deleting a Cluster CR tears down a real EKS cluster, so the reaper ships safe:
#   - DRY_RUN=true (the default) logs what would be reaped and deletes nothing.
#     Watch a cycle or two, confirm only genuinely-expired ephemeral spokes are
#     listed, then set DRY_RUN=false in this manifest to arm it.
#   - MAX_REAP caps how many clusters one run may delete. A clock skew or a
#     mis-set ttlDays could expire many live clusters at once; if more than
#     MAX_REAP are flagged, the job refuses to act and exits non-zero — a loud,
#     alertable failure (kube_job_failed) instead of a silent mass-deletion.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-reaper
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fleet-reaper
rules:
  # List every team's Cluster CRs and delete the expired ones. Scoped to the
  # Cluster API only — nothing else.
  - apiGroups: ["fleet.nanohype.dev"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fleet-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fleet-reaper
subjects:
  - kind: ServiceAccount
    name: fleet-reaper
    namespace: crossplane-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fleet-reaper
  namespace: crossplane-system
spec:
  schedule: "0 * * * *" # hourly; ttl is day-granular so this is ample
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: fleet-reaper
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              # kubectl + jq + sh. jq does the RFC3339 date math (fromdateiso8601),
              # so there's no GNU-vs-busybox `date -d` dependency. Pinned.
              image: alpine/k8s:1.31.1
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              env:
                # Safe by default: log candidates, delete nothing. Flip to "false"
                # (a reviewable GitOps change) to arm the reaper.
                - name: DRY_RUN
                  value: "true"
                # Circuit breaker: most one run may delete. Exceeding it fails the
                # job instead of mass-deleting on a TTL/clock fault.
                - name: MAX_REAP
                  value: "5"
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  now=$(date +%s)
                  expired=$(kubectl get clusters.fleet.nanohype.dev -A -o json | jq -r --argjson now "$now" '
                    .items[]
                    | select((.spec.ttlDays // 0) > 0)
                    | select((.metadata.creationTimestamp | fromdateiso8601) + (.spec.ttlDays * 86400) < $now)
                    | "\(.metadata.namespace)/\(.metadata.name)"')
                  if [ -z "$expired" ]; then
                    echo "no expired ephemeral clusters"
                    exit 0
                  fi
                  count=$(printf '%s\n' "$expired" | grep -c .)
                  echo "$count expired ephemeral cluster(s):"
                  printf '%s\n' "$expired" | sed 's/^/  /'
                  # A clock skew or mis-set ttlDays could flag many live clusters at
                  # once. Refuse to act and fail loudly rather than mass-delete.
                  if [ "$count" -gt "${MAX_REAP:-5}" ]; then
                    echo "ERROR: $count expired exceeds MAX_REAP=${MAX_REAP:-5} — refusing to reap." >&2
                    echo "Investigate (clock skew? mis-set ttlDays?) or raise MAX_REAP to proceed." >&2
                    exit 1
                  fi
                  if [ "${DRY_RUN:-true}" = "true" ]; then
                    echo "DRY-RUN: would reap the $count cluster(s) above. Set DRY_RUN=false to arm."
                    exit 0
                  fi
                  printf '%s\n' "$expired" | while IFS=/ read -r ns name; do
                    [ -n "$name" ] || continue
                    echo "reaping expired cluster $ns/$name"
                    kubectl delete clusters.fleet.nanohype.dev -n "$ns" "$name" --wait=false
                  done
