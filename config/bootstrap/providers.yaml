# provider-opentofu + its runtime tuning. Apply to the hub cluster after
# Crossplane v2 itself is installed (see README.md). In the real flow an eks-gitops
# ApplicationSet syncs these onto the hub cluster.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-opentofu
spec:
  package: xpkg.upbound.io/upbound/provider-opentofu:v1.1.3
  runtimeConfigRef:
    name: provider-opentofu
---
# The runtime config carries three things that matter for EKS:
#   1. The IRSA ServiceAccount — the hub's identity, annotated with the fleet
#      account role it assumes (and chains from, into each workload account). The
#      eks-fleet-crossplane role's trust policy names this SA subject
#      (system:serviceaccount:crossplane-system:provider-opentofu).
#   2. --timeout=60m — an EKS build outruns the 20m default and would otherwise be
#      killed mid-apply, leaking a half-built cluster + a stuck lock.
#   3. --poll=1m — provider-opentofu defaults to a 10m drift/output poll; 1m keeps the
#      Cluster status fresh as the Workspace converges.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-opentofu
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-opentofu
      annotations:
        # set by the bootstrap to the fleet-account Crossplane role
        eks.amazonaws.com/role-arn: arn:aws:iam::<FLEET_ACCOUNT_ID>:role/eks-fleet-crossplane
  deploymentTemplate:
    spec:
      selector: {}
      template:
        metadata:
          # Scraped by the hub's Grafana Agent → Amazon Managed Prometheus. The
          # provider serves controller-runtime metrics (reconcile rate/errors/
          # latency for the Workspace controller — the vend execution signal) on
          # :8080 by default. Feeds the fleet-vend dashboard in eks-gitops.
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
            prometheus.io/path: "/metrics"
        spec:
          containers:
            - name: package-runtime
              args:
                - --debug
                - --timeout=60m
                - --poll=1m
                - --max-reconcile-rate=5
