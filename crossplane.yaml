# This repo is a Crossplane Configuration package: the Cluster API (XRD) + the
# composition that implements it. Build/push it with the crossplane CLI, or have
# ArgoCD apply apis/ + compositions/ directly onto the management cluster.
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: eks-fleet
  annotations:
    meta.crossplane.io/maintainer: nanohype
    meta.crossplane.io/source: github.com/nanohype/eks-fleet
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Vends EKS clusters from a declarative namespaced Cluster resource by wrapping
      the landing-zone OpenTofu substrate via provider-opentofu.
spec:
  crossplane:
    version: ">=v2.0.0-0"
  dependsOn:
    - provider: xpkg.upbound.io/upbound/provider-opentofu
      version: ">=v1.1.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.8.0"
