# This repo is a Crossplane Configuration package: the Cluster API (XRD) + the
# composition that implements it. Build/push it with the crossplane CLI, or have
# ArgoCD apply apis/ + compositions/ directly onto the management cluster.
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: eks-fleet
  annotations:
    meta.crossplane.io/maintainer: nanohype
    meta.crossplane.io/source: github.com/nanohype/eks-fleet
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Vends EKS clusters from a declarative namespaced Cluster resource by wrapping
      the landing-zone OpenTofu substrate via provider-opentofu.
spec:
  crossplane:
    version: ">=v2.0.0-0"
  dependsOn:
    # >=v1.1.0 is load-bearing, not arbitrary: the composition's Workspace initArgs
    # set the S3-native `-backend-config=use_lockfile=true` backend, which needs the
    # runtime to ship OpenTofu >= 1.10. v1.1.0 is the release that bumped the bundled
    # tofu to 1.10.8 (the deployed pin in config/*/providers.yaml is v1.1.4, also
    # 1.10.8). Don't lower this below the tofu-1.10 line or state locking breaks.
    - provider: xpkg.upbound.io/upbound/provider-opentofu
      version: ">=v1.1.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-go-templating
      version: ">=v0.12.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.0"
