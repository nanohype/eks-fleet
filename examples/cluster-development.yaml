# Vend a development cluster into the development workload account. Apply to the MANAGEMENT cluster
# in your team namespace; the composition runs the landing-zone cluster-stack in
# account 111111111111 and fills in this resource's status as it converges. Under
# Crossplane v2 this namespaced Cluster IS the resource you apply (no separate claim);
# it's also the CI render target. Endpoint access is omitted, so the API endpoint is
# private (the default); public access is explicit opt-in with a CIDR allowlist —
# see examples/cluster-restricted.yaml.
apiVersion: fleet.nanohype.dev/v1alpha1
kind: Cluster
metadata:
  name: development-platform
  namespace: platform
spec:
  account: "111111111111"
  region: us-west-2
  environment: development
  # Cluster base name; the EKS cluster becomes <environment>-<clusterName> (development-platform).
  # Required and unique per (account, region, environment); must not equal environment.
  clusterName: platform
  team: platform
  # same-account vend: the hub's eks-fleet-crossplane role runs the Workspaces, and
  # its IAM gate only mints roles carrying the hub boundary — wire the SSM-published
  # ARN (/eks-fleet/development/fleet-hub/hub_permissions_boundary_arn) onto both halves.
  clusterPermissionsBoundaryArn: "arn:aws:iam::111111111111:policy/eks-fleet/eks-fleet-hub-boundary"
  operatorPermissionsBoundaryArn: "arn:aws:iam::111111111111:policy/eks-fleet/eks-fleet-hub-boundary"
  ttlDays: 7 # auto-reap this development cluster 7 days after creation (0/omit = persistent)
  clusterVersion: "1.35"
  systemNodes:
    instanceTypes: ["m7g.xlarge"]
    minSize: 2
    maxSize: 6
    desiredSize: 2
  # create mode (the default): the stack owns a disposable VPC. Omit `network`
  # entirely to take the defaults (10.0.0.0/16, 3 AZs, 1 NAT gateway); shown here
  # to set a single shared NAT gateway explicitly.
  network:
    mode: create
    create:
      vpcCidr: "10.0.0.0/16"
      natGateways: 1
