name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN; lint + render only read the repo.
# The pr-summary job opts into pull-requests: write on top of this.
permissions:
  contents: read

jobs:
  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yaml .

  substrate-contract:
    name: Substrate contract
    runs-on: ubuntu-latest
    needs: lint
    # crossplane render never runs tofu, so it can't see when the composition
    # templates a Workspace var the pinned landing-zone commit doesn't declare
    # (or omits one the substrate requires) — either fails every vend at
    # `tofu plan`. This job diffs, at the pinned SHA, the composition's templated
    # var keys against each entrypoint's variables.tf and asserts the two pins
    # move in lockstep. It fetches variables.tf fresh from the public landing-zone
    # repo at the pin (GITHUB_TOKEN authenticates the API call).
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check composition <-> substrate variable contract
        run: python3 scripts/check-substrate-contract.py

  render:
    name: Render compositions
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: install crossplane CLI
        run: |
          url=https://releases.crossplane.io/stable/v2.3.1/bin/linux_amd64/crank
          # releases.crossplane.io intermittently 403s for a minute or two. -f fails on
          # HTTP errors (no error-page saved); --retry-all-errors retries the 403 too;
          # a wide retry window (10 × ~6s, capped at 3m) rides out the CDN blip instead
          # of failing the run. (Bumped after the 5×3s window lost to a longer 403.)
          curl -fsSL --retry 10 --retry-delay 6 --retry-max-time 180 --retry-all-errors -o crossplane "$url"
          # a CDN error page can still slip through as HTTP 200 — verify it's a real binary
          file crossplane | grep -q ELF || { echo "::error::crossplane download is not an ELF binary (got an error page?)"; head -c200 crossplane; exit 1; }
          chmod +x crossplane
          ./crossplane version --client
          sudo mv crossplane /usr/local/bin/
      - name: render the Cluster examples against the composition
        # Under Crossplane v2 the namespaced Cluster IS the resource you apply — render
        # it directly (no claim/XR split). Catches schema/patch drift without a cluster.
        # --crossplane-version pins the render-engine image: render otherwise defaults
        # to "latest stable", which now resolves to the v1.20.x line (no `internal
        # render` subcommand → "unexpected argument internal"). Pin it to the v2 line
        # the CLI install above uses.
        run: |
          for ex in examples/*.yaml; do
            echo "::group::render $ex"
            crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml --crossplane-version v2.3.1
            echo "::endgroup::"
          done

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, substrate-contract, render]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## CI\nyamllint + substrate contract + crossplane render passed."
            });
