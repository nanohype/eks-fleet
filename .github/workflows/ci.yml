name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yaml .

  render:
    name: Render compositions
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: install crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin/
      - name: render the XR fixtures against the compositions
        # crossplane render operates on the composite (XCluster), not the Cluster
        # claim — render the XR fixtures in examples/xr/. The claim in examples/
        # is the product-facing form; it shares the XRD schema exercised here.
        run: |
          for ex in examples/xr/*.yaml; do
            echo "::group::render $ex"
            crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml
            echo "::endgroup::"
          done

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, render]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## CI\nyamllint + crossplane render passed."
            });
