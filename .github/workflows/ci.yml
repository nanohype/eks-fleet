name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN; lint + render only read the repo.
# The pr-summary job opts into pull-requests: write on top of this.
permissions:
  contents: read

jobs:
  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yaml .

  substrate-contract:
    name: Substrate contract
    runs-on: ubuntu-latest
    needs: lint
    # crossplane render never runs tofu, so it can't see when the composition
    # templates a Workspace var the pinned landing-zone commit doesn't declare
    # (or omits one the substrate requires) — either fails every vend at
    # `tofu plan`. This job diffs, at the pinned SHA, the composition's templated
    # var keys against each entrypoint's variables.tf and asserts the two pins
    # move in lockstep. It fetches variables.tf fresh from the public landing-zone
    # repo at the pin (GITHUB_TOKEN authenticates the API call).
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check composition <-> substrate variable contract
        run: python3 scripts/check-substrate-contract.py

  render:
    name: Render compositions
    runs-on: ubuntu-latest
    needs: lint
    env:
      # crank CLI + render-engine image version (kept identical between the two), and
      # the verified sha256 of the linux_amd64 crank binary at that version.
      CRANK_VERSION: v2.3.1
      # releases.crossplane.io publishes a crank.sha256 next to the binary, but it is
      # stale for this release (it does not match the shipped artifact), so the trusted
      # digest is pinned here instead — reviewed in-repo, independent of the CDN. Bump
      # it in lockstep whenever CRANK_VERSION moves; the gate below fails until you do.
      CRANK_SHA256: cb1fc84c0f04b7b3b88374a8037701b6c65a36007c28544968bde1011ca5491e
    steps:
      - uses: actions/checkout@v4
      - name: install crossplane CLI
        run: |
          url="https://releases.crossplane.io/stable/${CRANK_VERSION}/bin/linux_amd64/crank"
          # releases.crossplane.io intermittently 403s for a minute or two. -f fails on
          # HTTP errors (no error-page saved); --retry-all-errors retries the 403 too;
          # a wide retry window (10 × ~6s, capped at 3m) rides out the CDN blip instead
          # of failing the run. (Bumped after the 5×3s window lost to a longer 403.)
          curl -fsSL --retry 10 --retry-delay 6 --retry-max-time 180 --retry-all-errors -o crossplane "$url"
          # integrity gate: the download must match the pinned digest. Subsumes the old
          # ELF-sniff — it also rejects a CDN error page served as HTTP 200, and catches
          # any artifact drift or tampering at the pinned version.
          echo "${CRANK_SHA256}  crossplane" | sha256sum -c - || {
            echo "::error::crossplane CLI checksum mismatch for ${CRANK_VERSION} (corrupt download or artifact drift)";
            echo "got $(sha256sum crossplane | awk '{print $1}'), want ${CRANK_SHA256}"; head -c200 crossplane; exit 1;
          }
          chmod +x crossplane
          ./crossplane version --client
          sudo mv crossplane /usr/local/bin/
      - name: render the Cluster examples against the composition
        # Under Crossplane v2 the namespaced Cluster IS the resource you apply — render
        # it directly (no claim/XR split). Catches schema/patch drift without a cluster.
        # --crossplane-version pins the render-engine image to the same v2 line as the
        # CLI above: render otherwise defaults to "latest stable", which now resolves to
        # the v1.20.x line (no `internal render` subcommand → "unexpected argument
        # internal").
        run: |
          for ex in examples/*.yaml; do
            echo "::group::render $ex"
            crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml --crossplane-version "${CRANK_VERSION}"
            echo "::endgroup::"
          done
      - name: render the observed-status fixture (gated bootstrap/Usage/write-back branches)
        # The examples/ carry no status, so the loop above only ever renders the
        # always-on cluster-stack Workspace — the status-gated blocks (the
        # cluster-bootstrap Workspace, its teardown Usage, and the status write-back)
        # never render, which is exactly the branch a missing/undeclared bootstrap var
        # can hide in until a live vend. This fixture supplies a converged
        # Cluster.status (lights the `{{ if $endpoint }}` branch) plus an observed
        # cluster-stack Workspace carrying tofu outputs via --observed-resources (lights
        # the `{{ if $csEndpoint }}` write-back), so every branch of the composition is
        # exercised on each PR.
        run: |
          crossplane render tests/render/cluster-with-status.yaml \
            compositions/cluster-aws.yaml config/functions.yaml \
            --observed-resources tests/render/observed \
            --crossplane-version "${CRANK_VERSION}"

  cel-tests:
    name: CEL admission tests
    runs-on: ubuntu-latest
    needs: lint
    # crossplane render never evaluates CEL, so the XRD's x-kubernetes-validations
    # (public-endpoint-with-empty-allowlist, adopt-mode preconditions, the
    # boundary-ARN requirement, the name-doubling guard, the network mutual-exclusion
    # rules) are otherwise unproven. This job derives a plain CRD from the XRD, installs
    # it on a kind cluster, and asserts each reject fixture is denied at admission with
    # its declared message and each accept fixture + example is admitted.
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: eks-fleet-cel
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: run CEL admission tests
        env:
          CEL_TEST_CLUSTER: eks-fleet-cel
        run: scripts/cel-admission-test.sh

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, substrate-contract, render, cel-tests]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## CI\nyamllint + substrate contract + crossplane render + CEL admission tests passed."
            });
