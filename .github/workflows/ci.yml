name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yaml .

  render:
    name: Render compositions
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: install crossplane CLI
        run: |
          url=https://releases.crossplane.io/stable/v2.3.1/bin/linux_amd64/crank
          # -f fails on HTTP errors (no error-page saved); --retry rides out CDN hiccups
          curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors -o crossplane "$url"
          # a CDN error page can still slip through as HTTP 200 — verify it's a real binary
          file crossplane | grep -q ELF || { echo "::error::crossplane download is not an ELF binary (got an error page?)"; head -c200 crossplane; exit 1; }
          chmod +x crossplane
          ./crossplane version --client
          sudo mv crossplane /usr/local/bin/
      - name: render the Cluster examples against the composition
        # Under Crossplane v2 the namespaced Cluster IS the resource you apply — render
        # it directly (no claim/XR split). Catches schema/patch drift without a cluster.
        run: |
          for ex in examples/*.yaml; do
            echo "::group::render $ex"
            crossplane render "$ex" compositions/cluster-aws.yaml config/functions.yaml
            echo "::endgroup::"
          done

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, render]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## CI\nyamllint + crossplane render passed."
            });
